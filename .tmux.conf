# -----------------------------------------------------------------------------
# THEIZEKRY'S ULTIMATE TMUX CONFIG
# -----------------------------------------------------------------------------

# --- KEY BINDINGS ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
unbind r
bind r source-file ~/.tmux.conf

# --- NEW: LAZYGIT SHORTCUT ---
# Press Prefix + g to open LazyGit in a new window
bind g new-window -n "LazyGit" -c "#{pane_current_path}" "lazygit"

# --- NEW: TINKER QUICK-RESTART ---
# Press Prefix + T to kill current tinker and start fresh (Assumes you are in a Laravel project)
bind T send-keys "exit" Enter "php artisan tinker" Enter

# --- PERFORMANCE ---
set -g status-interval 5
set -g escape-time 0

# --- GENERAL SETTINGS ---
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g history-limit 1000000
set -g default-terminal "screen-256color"

# --- VPN MONITOR (THE TESTED VERSION) ---
vpn_status="#[fg=green]#{?#(ping -c 1 -t 1 10.10.23.81 > /dev/null && echo 'active'),VPN,#[fg=red,bold]VPN OFF}"

# --- STATUS BAR DESIGN ---
set -g status-style 'bg=#1e1e2e,fg=white'
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=black]#[bg=yellow] #S #[default],#[fg=white]#[bg=blue] #S #[default]} "

set -g status-right-length 150
set -g status-right "#[fg=white,bg=#313244] $vpn_status #[fg=white]| CPU: #{cpu_percentage} | RAM: #{ram_percentage} | Used: #{df_percent} | %a %H:%M "

# --- COPY MODE (VIM STYLE) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tassaron/tmux-df'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Logging Plugin (Saves terminal output to files)
set -g @plugin 'tmux-plugins/tmux-logging'

# --- PERSISTENCE (RESTORE SESSIONS) ---
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatic restore settings
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
