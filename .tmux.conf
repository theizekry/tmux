# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Change prefix to Ctrl + A (instead of Ctrl + B) for easy use
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Refresh tmux configuration with 'Prefix + r'
unbind r
bind r source-file ~/.tmux.conf

# General Customization
set -g mouse on                         # Enable mouse support
set -g base-index 1                    # Start indexing windows at 1 instead of 0
set -g renumber-windows on             # Renumber all windows when any window is closed
set -g history-limit 1000000           # Increase history size
set -g set-clipboard on                # Use system clipboard
set -g default-terminal "${TERM}"
set -g escape-time 0                   # Zero-out escape time delay

# -----------------------------------------------------------------------------
# Copy Mode & Search (Vim Style)
# -----------------------------------------------------------------------------

# Use Vim keybindings in copy mode
setw -g mode-keys vi

# Fix for search: Map '/' and '?' to work properly in copy-mode-vi
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Navigation between search results
bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse

# -----------------------------------------------------------------------------
# Clipboard Integration
# -----------------------------------------------------------------------------

# Manual clipboard bindings (Backup for tmux-yank)
bind y run-shell "tmux save-buffer - | sh -c 'if command -v pbcopy >/dev/null; then pbcopy; elif command -v xclip >/dev/null; then xclip -i -sel clip; fi'"
bind p run-shell "tmux set-buffer \"$(sh -c 'if command -v pbpaste >/dev/null; then pbpaste; elif command -v xclip >/dev/null; then xclip -o -sel clip; fi')\"; tmux paste-buffer"

# -----------------------------------------------------------------------------
# UI & Panes
# -----------------------------------------------------------------------------

# Status bar position
set-option -g status-position bottom
set-option -g default-terminal 'screen-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

# Pane borders
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# Pane navigation (Vim style)
bind -r h select-pane -L
bind -r l select-pane -R
bind -r k select-pane -U
bind -r j select-pane -D

# -----------------------------------------------------------------------------
# Plugins (managed by TPM)
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# CPU & RAM monitoring in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g status-right 'CPU: #{cpu_percentage} | RAM: #{ram_percentage} | %a %h-%d %H:%M '

# Session management
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
